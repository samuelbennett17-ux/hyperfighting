<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Game Landing Page</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: #fff;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    header {
      background: #222;
      padding: 20px;
      text-align: center;
      font-size: 24px;
      font-weight: bold;
    }

    main {
      flex: 1;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      padding: 20px;
      gap: 20px;
    }

    .box {
      background: #1a1a1a;
      padding: 20px;
      border-radius: 8px;
      width: 300px;
      max-width: 90%;
      text-align: center;
    }

    footer {
      background: #222;
      text-align: center;
      padding: 15px;
      font-size: 14px;
    }

    a.button {
      display: inline-block;
      margin-top: 10px;
      padding: 10px 16px;
      background: #444;
      color: #fff;
      text-decoration: none;
      border-radius: 6px;
    }

    a.button:hover {
      background: #666;
    }
  </style>
</head>

<body>

  <header>
    🎮 My Game
  </header>

  <main>
    <div class="box">
      <h2>Play the Game</h2>
      <p>Jump into the action!</p>
      <a href="https://samuelbennett17-ux.github.io/hyperfighting/brgame.html" 
         target="_blank" 
         class="button">
        ▶ Play Now
      </a>
    </div>

    <div class="box">
      <h2>About</h2>
      <p>
        This is a fast-paced PICO-8 game. Fight, survive, and beat your high score!
      </p>
    </div>
  </main>

  <footer>
    © 2026 Your Name — Built with PICO-8
  </footer>

</body>
</html>
